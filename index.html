<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Utilities</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
        color: #24282f;
        background: #f3f1ec;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: start center;
        padding: 56px 18px;
      }

      main {
        width: min(880px, 100%);
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(26px, 6vw, 42px);
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: #69717d;
        line-height: 1.7;
      }

      .utility-list {
        display: grid;
        gap: 12px;
        margin-top: 28px;
      }

      .utility {
        display: grid;
        grid-template-columns: 42px minmax(0, 1fr) auto;
        gap: 14px;
        align-items: center;
        padding: 16px;
        border: 1px solid #d9d5cd;
        border-radius: 8px;
        background: #fffefa;
        color: inherit;
        text-decoration: none;
      }

      .utility:hover {
        border-color: #0f766e;
        background: #f7fffd;
      }

      .mark {
        width: 42px;
        height: 42px;
        border-radius: 8px;
        background:
          linear-gradient(90deg, transparent 47%, rgba(255, 255, 255, 0.92) 47% 53%, transparent 53%),
          linear-gradient(0deg, transparent 47%, rgba(255, 255, 255, 0.92) 47% 53%, transparent 53%),
          linear-gradient(135deg, #0f766e, #2563eb);
      }

      .name {
        font-weight: 700;
      }

      .desc {
        margin-top: 4px;
        font-size: 14px;
      }

      .open {
        color: #0f766e;
        font-weight: 700;
      }

      @media (max-width: 560px) {
        .utility {
          grid-template-columns: 38px minmax(0, 1fr);
        }

        .open {
          grid-column: 2;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Utilities</h1>
      <p>小さな画像・制作補助ツールをここにまとめます。</p>

      <div class="utility-list">
        <a class="utility" href="grid-cropper/">
          <span class="mark" aria-hidden="true"></span>
          <span>
            <span class="name">Grid Cropper</span>
            <span class="desc">白い区切り線を手がかりに、グリッド画像をPNGで一括切り抜きします。</span>
          </span>
          <span class="open">開く</span>
        </a>
      </div>
    </main>
  </body>
</html>
